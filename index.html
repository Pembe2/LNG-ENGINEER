<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LNG Knowledge Deck</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef2f7;
      color: #172033;
    }

    header {
      background: #102a43;
      color: white;
      padding: 24px 18px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 30px;
    }

    header p {
      margin: 8px 0 0;
      color: #d9e2ec;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .stat strong {
      display: block;
      font-size: 26px;
      color: #102a43;
    }

    .toolbar, .panel {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    input, select, textarea, button {
      font-size: 16px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #bcccdc;
      margin: 4px;
    }

    input, textarea {
      width: 100%;
    }

    button {
      border: none;
      cursor: pointer;
      background: #2673d9;
      color: white;
      font-weight: bold;
    }

    button.secondary { background: #52606d; }
    button.good { background: #1f8a4c; }
    button.bad { background: #c92a2a; }
    button.light { background: #d9e2ec; color: #102a43; }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .category-card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      cursor: pointer;
      border: 2px solid transparent;
    }

    .category-card:hover {
      border-color: #2673d9;
    }

    .category-card h3 {
      margin: 0 0 8px;
    }

    .flashcard {
      background: white;
      border-radius: 18px;
      padding: 30px;
      min-height: 260px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin-bottom: 16px;
    }

    .tag {
      color: #627d98;
      text-transform: uppercase;
      font-size: 13px;
      margin-bottom: 14px;
      font-weight: bold;
    }

    .card-text {
      font-size: 28px;
      line-height: 1.35;
    }

    .controls {
      text-align: center;
      margin-bottom: 20px;
    }

    .hidden {
      display: none;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 700px) {
      .two-col {
        grid-template-columns: 1fr;
      }

      .card-text {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>LNG Knowledge Deck</h1>
    <p>Flashcards for LNG distribution engineering, operations, safety, and field judgment</p>
  </header>

  <main>
    <section class="stats">
      <div class="stat"><strong id="totalCards">0</strong>Total Cards</div>
      <div class="stat"><strong id="knownCards">0</strong>Known</div>
      <div class="stat"><strong id="reviewCards">0</strong>Needs Review</div>
      <div class="stat"><strong id="activeCards">0</strong>Current Deck</div>
    </section>

    <section class="toolbar">
      <button onclick="setMode('all')">All Cards</button>
      <button onclick="setMode('review')" class="bad">Needs Review</button>
      <button onclick="shuffleDeck()" class="secondary">Shuffle</button>
      <button onclick="resetProgress()" class="light">Reset Progress</button>
      <input id="searchInput" placeholder="Search cards..." oninput="searchCards()" />
    </section>

    <section>
      <h2>Study by Category</h2>
      <div id="categoryGrid" class="category-grid"></div>
    </section>

    <section class="flashcard">
      <div class="tag" id="cardTag">Choose a deck</div>
      <div class="card-text" id="cardText">Pick a category or study mode to begin.</div>
    </section>

    <section class="controls">
      <button onclick="previousCard()" class="secondary">Previous</button>
      <button onclick="flipCard()">Show Answer</button>
      <button onclick="markKnown()" class="good">I Know This</button>
      <button onclick="markReview()" class="bad">Needs Review</button>
      <button onclick="nextCard()" class="secondary">Next</button>
    </section>

    <section class="panel">
      <h2>Add a Flashcard</h2>
      <input id="newCategory" placeholder="Category, e.g. LNG Basics" />
      <textarea id="newQuestion" placeholder="Question"></textarea>
      <textarea id="newAnswer" placeholder="Answer"></textarea>
      <button onclick="addCard()">Add Card</button>
    </section>

    <section class="panel">
      <h2>Backup / Import</h2>
      <button onclick="exportDeck()">Export Deck</button>
      <input type="file" id="importFile" onchange="importDeck(event)" />
    </section>
  </main>

  <script>
    const starterCards = [
      {
        category: "LNG Basics",
        question: "What does LNG stand for?",
        answer: "Liquefied Natural Gas.",
        status: ""
      },
      {
        category: "LNG Basics",
        question: "Why is natural gas liquefied?",
        answer: "Liquefaction reduces natural gas volume by about 600:1, making storage and transport more practical.",
        status: ""
      },
      {
        category: "Cryogenics",
        question: "At approximately what temperature is LNG stored?",
        answer: "About -162°C or -260°F at near-atmospheric pressure.",
        status: ""
      },
      {
        category: "Safety",
        question: "Is liquid LNG itself flammable?",
        answer: "No. The liquid is not flammable, but vaporized natural gas can ignite when mixed with air in the flammable range.",
        status: ""
      },
      {
        category: "Safety",
        question: "What is methane’s approximate flammable range in air?",
        answer: "Roughly 5% to 15% methane by volume in air.",
        status: ""
      },
      {
        category: "Storage Tanks",
        question: "What is boil-off gas?",
        answer: "Boil-off gas is vapor created when heat leaks into an LNG tank and causes some LNG to evaporate.",
        status: ""
      },
      {
        category: "Vaporizers",
        question: "What does an LNG vaporizer do?",
        answer: "It adds heat to LNG so it converts from liquid back into natural gas.",
        status: ""
      },
      {
        category: "Distribution",
        question: "What is odorization?",
        answer: "The addition of odorant to natural gas so leaks can be detected by smell.",
        status: ""
      },
      {
        category: "Piping",
        question: "Why are thermal relief valves important in LNG piping?",
        answer: "They protect trapped liquid sections from dangerous pressure rise as LNG warms and expands.",
        status: ""
      },
      {
        category: "Codes & Standards",
        question: "What is 49 CFR Part 193?",
        answer: "U.S. federal safety standards for LNG facilities used in pipeline gas transportation.",
        status: ""
      }
    ];

    let cards = JSON.parse(localStorage.getItem("lngKnowledgeDeck")) || starterCards;
    let activeDeck = [...cards];
    let currentIndex = 0;
    let showingAnswer = false;
    let currentMode = "all";

    function saveDeck() {
      localStorage.setItem("lngKnowledgeDeck", JSON.stringify(cards));
    }

    function updateStats() {
      document.getElementById("totalCards").textContent = cards.length;
      document.getElementById("knownCards").textContent = cards.filter(c => c.status === "Known").length;
      document.getElementById("reviewCards").textContent = cards.filter(c => c.status === "Needs Review").length;
      document.getElementById("activeCards").textContent = activeDeck.length;
    }

    function buildCategories() {
      const grid = document.getElementById("categoryGrid");
      grid.innerHTML = "";

      const categories = [...new Set(cards.map(c => c.category))].sort();

      categories.forEach(category => {
        const count = cards.filter(c => c.category === category).length;
        const review = cards.filter(c => c.category === category && c.status === "Needs Review").length;

        const div = document.createElement("div");
        div.className = "category-card";
        div.onclick = () => setCategory(category);
        div.innerHTML = `
          <h3>${category}</h3>
          <p>${count} cards</p>
          <p>${review} need review</p>
        `;
        grid.appendChild(div);
      });
    }

    function renderCard() {
      updateStats();
      buildCategories();

      if (activeDeck.length === 0) {
        document.getElementById("cardTag").textContent = "No cards found";
        document.getElementById("cardText").textContent = "Try another category, search term, or add more cards.";
        return;
      }

      const card = activeDeck[currentIndex];

      document.getElementById("cardTag").textContent =
        `${card.category} | Card ${currentIndex + 1} of ${activeDeck.length} | ${card.status || "Unmarked"}`;

      document.getElementById("cardText").textContent =
        showingAnswer ? card.answer : card.question;
    }

    function setMode(mode) {
      currentMode = mode;
      showingAnswer = false;
      currentIndex = 0;

      if (mode === "all") {
        activeDeck = [...cards];
      }

      if (mode === "review") {
        activeDeck = cards.filter(c => c.status === "Needs Review");
      }

      renderCard();
    }

    function setCategory(category) {
      currentMode = category;
      activeDeck = cards.filter(c => c.category === category);
      currentIndex = 0;
      showingAnswer = false;
      renderCard();
    }

    function searchCards() {
      const term = document.getElementById("searchInput").value.toLowerCase().trim();

      if (!term) {
        setMode("all");
        return;
      }

      activeDeck = cards.filter(c =>
        c.category.toLowerCase().includes(term) ||
        c.question.toLowerCase().includes(term) ||
        c.answer.toLowerCase().includes(term)
      );

      currentIndex = 0;
      showingAnswer = false;
      renderCard();
    }

    function flipCard() {
      if (activeDeck.length === 0) return;
      showingAnswer = !showingAnswer;
      renderCard();
    }

    function nextCard() {
      if (activeDeck.length === 0) return;
      currentIndex = (currentIndex + 1) % activeDeck.length;
      showingAnswer = false;
      renderCard();
    }

    function previousCard() {
      if (activeDeck.length === 0) return;
      currentIndex = (currentIndex - 1 + activeDeck.length) % activeDeck.length;
      showingAnswer = false;
      renderCard();
    }

    function findOriginalCard(card) {
      return cards.find(c =>
        c.category === card.category &&
        c.question === card.question &&
        c.answer === card.answer
      );
    }

    function markKnown() {
      if (activeDeck.length === 0) return;
      const original = findOriginalCard(activeDeck[currentIndex]);
      if (original) original.status = "Known";
      saveDeck();
      nextCard();
    }

    function markReview() {
      if (activeDeck.length === 0) return;
      const original = findOriginalCard(activeDeck[currentIndex]);
      if (original) original.status = "Needs Review";
      saveDeck();
      nextCard();
    }

    function shuffleDeck() {
      for (let i = activeDeck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [activeDeck[i], activeDeck[j]] = [activeDeck[j], activeDeck[i]];
      }

      currentIndex = 0;
      showingAnswer = false;
      renderCard();
    }

    function resetProgress() {
      if (!confirm("Reset all Known and Needs Review markings?")) return;

      cards.forEach(card => card.status = "");
      saveDeck();
      setMode("all");
    }

    function addCard() {
      const category = document.getElementById("newCategory").value.trim();
      const question = document.getElementById("newQuestion").value.trim();
      const answer = document.getElementById("newAnswer").value.trim();

      if (!category || !question || !answer) {
        alert("Please fill in category, question, and answer.");
        return;
      }

      cards.push({ category, question, answer, status: "" });
      saveDeck();

      document.getElementById("newCategory").value = "";
      document.getElementById("newQuestion").value = "";
      document.getElementById("newAnswer").value = "";

      setCategory(category);
    }

    function exportDeck() {
      const data = JSON.stringify(cards, null, 2);
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "lng-knowledge-deck.json";
      a.click();

      URL.revokeObjectURL(url);
    }

    function importDeck(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);

          if (!Array.isArray(imported)) {
            throw new Error("Deck must be an array.");
          }

          cards = imported.map(card => ({
            category: card.category || "Uncategorized",
            question: card.question || "",
            answer: card.answer || "",
            status: card.status || ""
          }));

          saveDeck();
          setMode("all");
          alert("Deck imported successfully.");
        } catch {
          alert("Import failed. Make sure the file is valid JSON.");
        }
      };

      reader.readAsText(file);
    }

    renderCard();
  </script>
</body>
</html>
